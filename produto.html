<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto</title>

<!-- FAVICON -->
<link rel="icon" href="assets/faviconclub.png" type="image/png">
<link rel="apple-touch-icon" href="assets/favinconneed.png">

<link rel="stylesheet" href="./style.css">


</head>

<body>

<section class="product-page">

  <div class="product-grid">

    <div class="product-image">
      <img id="imgProduto">
    </div>

    <div class="product-info">
      <h1 id="nomeProduto"></h1>
      <p>Alta performance sonora com qualidade premium Audiophonic.</p>

      <ul class="specs">
        <li>✔ Alta potência</li>
        <li>✔ Construção premium</li>
        <li>✔ Som limpo e forte</li>
      </ul>

      <a id="btnComprar" class="btn-buy">Encontrar revendedor</a>
    </div>

  </div>

</section>

<script>

const params = new URLSearchParams(window.location.search);
const nome = params.get("produto");

const nomeEl = document.getElementById("nomeProduto");
const imgEl = document.getElementById("imgProduto");
const btn = document.getElementById("btnComprar");

/* SIMULA BANCO DE PRODUTOS */
const produtos = {
  "Sub Club 12": {
    img: "./assets/club.jpg.jpeg"
  },
  "Amp Club 800": {
    img: "./assets/club.jpg.jpeg"
  },
  "Sub Need 10": {
    img: "./assets/need.jpg.jpeg"
  },
  "Sub Sensation 15": {
    img: "./assets/sensation.jpg.jpeg"
  }
};

const produto = produtos[nome];

if (produto) {
  nomeEl.innerText = nome;
  imgEl.src = produto.img;

  btn.href = `./index.html?produto=${encodeURIComponent(nome)}#distribuidores`;
}

</script>

</body>
</html>
